name: "Generate tree-sitter language objects"

on: [release, workflow_dispatch]

jobs:
  generate-languages:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        lang:
          - name: rust
            url: tree-sitter/tree-sitter-rust
          - name: python
            url: tree-sitter/tree-sitter-python
          - name: javascript
            url: tree-sitter/tree-sitter-javascript

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: actions/checkout@v7
        with:
          repository: ${{ matrix.lang.url }}
          path: ${{ matrix.lang.name }}

      - uses: tree-sitter/setup-action@v2

      - name: Build
        working-directory: ${{ matrix.lang.name }}
        run: |
          tree-sitter build

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.lang.name }}_parser.so
          path: ${{ matrix.lang.name }}/parser.so

  merge-languages:
    needs: generate-languages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/upload-artifact/merge@v7
        with:
          name: parsers
          delete-merged: true
